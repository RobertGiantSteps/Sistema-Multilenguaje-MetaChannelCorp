# ──────────────────────────────────────────────────────────
# metachannelcorp.ie — Redirección 301 permanente a .com/en/
# El .ie NO sirve contenido propio (evita contenido duplicado)
# ──────────────────────────────────────────────────────────

# .ie HTTP → 301 a .com/en/
server {
    listen 80;
    server_name metachannelcorp.ie;
    return 301 https://metachannelcorp.com/en/$request_uri;
}

# .ie HTTPS → 301 a .com/en/
server {
    listen 443 ssl;
    server_name metachannelcorp.ie;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://metachannelcorp.com/en/$request_uri;
}

# ──────────────────────────────────────────────────────────
# metachannelcorp.com — Dominio principal (contenido activo)
# ──────────────────────────────────────────────────────────

# .com HTTP → HTTPS
server {
    listen 80;
    server_name metachannelcorp.com;
    return 301 https://$host$request_uri;
}

# .com HTTPS — WordPress
server {
    listen 443 ssl;
    server_name metachannelcorp.com;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root  /var/www/html;
    index index.php index.html;

    client_max_body_size 64M;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass  wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_HOST      $http_host;
        fastcgi_param HTTPS          on;
        include fastcgi_params;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
    }

    location ~ /\.ht {
        deny all;
    }
}
